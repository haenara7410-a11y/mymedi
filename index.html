<index html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 약 복용 알림이</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="내 약 상자">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/822/822143.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; padding: 1rem; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .preset-btn { transition: all 0.2s; border: 2px solid transparent; background: #fff; }
        .preset-btn.selected { border-color: #4f46e5; background-color: #eef2ff; color: #4f46e5; font-weight: bold; }
        @supports (-webkit-touch-callout: none) { .app-safe-area { padding-top: env(safe-area-inset-top); } }
    </style>
</head>
<body class="pb-10">

    <div id="kakao-status-bar" class="bg-slate-800 text-white text-center py-4 text-sm font-bold cursor-pointer shadow-lg sticky top-0 z-50 app-safe-area" onclick="loginWithKakao()">
        <div class="flex items-center justify-center gap-2">
            <i id="kakao-icon" class="fa-solid fa-spinner fa-spin text-yellow-400"></i>
            <span id="kakao-status-text">카카오 준비 중...</span>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 pt-6">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">나의 약 상자 💊</h1>
                <p class="text-slate-500 text-sm" id="today-date"></p>
            </div>
        </div>

        <div id="next-reminder-card" class="card p-6 mb-8 bg-indigo-600 text-white shadow-xl relative overflow-hidden">
            <h2 class="text-indigo-100 text-sm font-medium">다음 복용 예정</h2>
            <div id="next-reminder-text" class="mt-2 text-2xl font-bold">등록된 약이 없습니다</div>
        </div>

        <div class="flex items-center justify-between mb-4 px-1">
            <h3 class="text-lg font-bold text-slate-800">복용 리스트</h3>
            <button onclick="openModal('add-modal')" class="bg-white text-indigo-600 border border-indigo-100 px-4 py-2 rounded-xl font-bold text-sm shadow-sm active:scale-95 transition-all">
                <i class="fa-solid fa-plus mr-1"></i> 추가
            </button>
        </div>

        <div id="medication-list" class="space-y-4"></div>
    </div>

    <div id="add-modal" class="modal">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm">
            <h2 class="text-xl font-bold mb-5 text-slate-800">새 약 등록</h2>
            <div class="space-y-4">
                <input type="text" id="pill-name" placeholder="약 이름 (예: 비타민)" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-indigo-500">
                <input type="time" id="pill-time" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-indigo-500">
                <div class="flex gap-2">
                    <button onclick="addMedication()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold">등록</button>
                    <button onclick="closeModal('add-modal')" class="px-6 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">취소</button>
                </div>
            </div>
        </div>
    </div>

    <div id="alarm-modal" class="modal">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
            <i class="fa-solid fa-bell text-4xl text-indigo-500 mb-4 block"></i>
            <h2 class="text-xl font-bold text-slate-800 mb-2">약 드실 시간입니다!</h2>
            <p id="alarm-pill-name" class="text-2xl text-indigo-600 font-extrabold mb-8"></p>
            <button onclick="confirmIntake()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-lg mb-3">복용 확인 (카톡 전송)</button>
            <button onclick="closeModal('alarm-modal')" class="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-medium">닫기</button>
        </div>
    </div>

    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>

    <script>
        // ⚠️ [중요] 여기에 'JavaScript 키'를 입력하세요!
        const KAKAO_JS_KEY = '4f5a3cc43665c77a32020dbcdfff6b30'; 
        
        let medications = [];
        let isKakaoLinked = false;
        let currentAlarmMed = null;

        function initKakao() {
            if (typeof Kakao !== 'undefined') {
                if (!Kakao.isInitialized()) Kakao.init(KAKAO_JS_KEY);
                if (Kakao.Auth.getAccessToken()) {
                    isKakaoLinked = true;
                    updateKakaoUI(true);
                } else {
                    updateKakaoUI(false);
                }
            }
        }

        function loginWithKakao() {
            Kakao.Auth.authorize({
                redirectUri: 'https://haenara7410-a11y.github.io/mymedi/'
            });
        }

        function updateKakaoUI(linked) {
            const bar = document.getElementById('kakao-status-bar');
            const text = document.getElementById('kakao-status-text');
            const icon = document.getElementById('kakao-icon');
            if(linked) {
                bar.classList.replace('bg-slate-800', 'bg-yellow-400');
                bar.classList.add('text-slate-900');
                text.innerText = '카카오 알림 연결됨';
                icon.className = 'fa-solid fa-circle-check text-green-600';
            } else {
                text.innerText = '카카오톡 알림 연결하기 (클릭)';
                icon.className = 'fa-solid fa-comment text-yellow-400';
            }
        }

        function addMedication() {
            const name = document.getElementById('pill-name').value;
            const time = document.getElementById('pill-time').value;
            if (!name || !time) return alert("입력해주세요!");
            medications.push({ id: Date.now(), name, time, lastNotified: null });
            saveData();
            closeModal('add-modal');
        }

        function saveData() {
            localStorage.setItem('med_data_v1', JSON.stringify(medications));
            renderList();
            updateNextReminderUI();
        }

        function renderList() {
            const list = document.getElementById('medication-list');
            list.innerHTML = '';
            medications.forEach(med => {
                const div = document.createElement('div');
                div.className = 'card p-5 flex justify-between items-center border-l-4 border-indigo-500';
                div.innerHTML = `<div><div class="font-bold">${med.name}</div><div class="text-sm text-slate-400">${med.time}</div></div>
                                 <button onclick="deleteMed(${med.id})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>`;
                list.appendChild(div);
            });
        }

        function deleteMed(id) {
            medications = medications.filter(m => m.id !== id);
            saveData();
        }

        function checkAlarms() {
            const now = new Date();
            const curTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            medications.forEach(med => {
                if (med.time === curTime && med.lastNotified !== now.toLocaleDateString()) {
                    currentAlarmMed = med;
                    document.getElementById('alarm-pill-name').innerText = med.name;
                    openModal('alarm-modal');
                }
            });
        }

        function confirmIntake() {
            if (isKakaoLinked) {
                Kakao.API.request({
                    url: '/v2/api/talk/memo/default/send',
                    data: {
                        template_object: {
                            object_type: 'text',
                            text: `[복용 완료] ${currentAlarmMed.name} 약을 복용했습니다.`,
                            link: { mobile_web_url: 'https://haenara7410-a11y.github.io/mymedi/' }
                        }
                    }
                });
            }
            currentAlarmMed.lastNotified = new Date().toLocaleDateString();
            saveData();
            closeModal('alarm-modal');
        }

        function updateNextReminderUI() {
            if(medications.length === 0) return;
            const next = medications.sort((a,b) => a.time.localeCompare(b.time))[0];
            document.getElementById('next-reminder-text').innerText = `${next.time} - ${next.name}`;
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        window.onload = () => {
            document.getElementById('today-date').innerText = new Date().toLocaleDateString();
            const saved = localStorage.getItem('med_data_v1');
            if (saved) medications = JSON.parse(saved);
            renderList();
            updateNextReminderUI();
            initKakao();
            setInterval(checkAlarms, 10000);
        };
    </script>
</body>
</html>
